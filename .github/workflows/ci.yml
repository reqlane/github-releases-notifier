name: CI
 
on:
  push:
    branches: ["*"]
 
jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24.x"
 
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
 
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
 
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.x"
 
      - name: Test
        run: go test -v ./...
 
